# ACS730 GitHub Actions CI Pipeline
#
# This file EVOLVES week by week — uncomment sections as you learn each topic.
# Week 3:  pre-commit stage only
# Week 4:  + opentofu validate
# Week 8:  + ansible-lint
# Week 9:  + opentofu apply (self-hosted runner + manual gate via environment)
# Week 12: + checkov security scan
#
# Self-hosted runner (Week 9+): EC2 instance with LabRole, tagged 'acs730'
# Before Week 9: uses GitHub-hosted ubuntu-latest runner

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  TF_ROOT: terraform
  AWS_DEFAULT_REGION: us-east-1

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: lint
# Week 3 — always active
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: validate
# Week 4 — uncomment this job
# ─────────────────────────────────────────────────────────────────────────────
  tofu-validate:
    name: OpenTofu fmt + validate
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.x"
      - name: tofu fmt check
        run: tofu fmt -check -recursive -diff
        working-directory: ${{ env.TF_ROOT }}
      - name: tofu init (no backend)
        run: tofu init -backend=false
        working-directory: ${{ env.TF_ROOT }}
      - name: tofu validate
        run: tofu validate -no-color
        working-directory: ${{ env.TF_ROOT }}

