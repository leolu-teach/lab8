---
# ACS730 GitHub Actions CI Pipeline
#
# This file EVOLVES week by week — uncomment sections as you learn each topic.
# Week 3:  pre-commit stage only         (active now)
# Week 4:  + opentofu validate           (uncomment tofu-validate job)
# Week 8:  + ansible-lint               (uncomment ansible-lint job)
# Week 9:  + opentofu apply             (uncomment tofu-plan + tofu-apply-* jobs)
# Week 12: + checkov security scan      (uncomment checkov-scan job)
#
# Self-hosted runner (Week 9+): EC2 instance with LabRole, tagged 'acs730'
# Before Week 9: uses GitHub-hosted ubuntu-latest runner

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  TF_ROOT: terraform
  AWS_DEFAULT_REGION: us-east-1

jobs:
# =============================================================================
# STAGE: lint — Week 3 (always active)
# =============================================================================
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install OpenTofu so terraform_fmt / terraform_validate hooks work
      # when .tf files are present (Week 4+ labs). No-op for labs 1-3.
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.x"

      # pre-commit-terraform looks for 'terraform' binary by default;
      # symlink tofu so it finds it without extra configuration.
      - name: Symlink tofu as terraform for pre-commit-terraform
        run: sudo ln -sf "$(which tofu)" /usr/local/bin/terraform

      - uses: pre-commit/action@v3.0.1

